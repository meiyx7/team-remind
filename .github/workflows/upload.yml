name: 上传小程序

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.2.0)，留空则读 VERSION 文件'
        required: false
        default: ''
      desc:
        description: '版本描述'
        required: false
        default: '团队待办小程序代码上传'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Write private key
        env:
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$WX_PRIVATE_KEY" > private.key
          # 校验密钥格式
          head -1 private.key
          echo "密钥行数: $(wc -l < private.key)"

      - name: Resolve version
        id: ver
        run: |
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ -z "$INPUT_VER" ]; then
            # push 触发或手动留空：读 VERSION 文件
            FILE_VER=$(tr -d '[:space:]' < VERSION)
            echo "version=$FILE_VER" >> $GITHUB_OUTPUT
            echo "desc=团队待办小程序 v${FILE_VER} 代码上传" >> $GITHUB_OUTPUT
          else
            echo "version=$INPUT_VER" >> $GITHUB_OUTPUT
            INPUT_DESC="${{ github.event.inputs.desc }}"
            [ -z "$INPUT_DESC" ] && INPUT_DESC="团队待办小程序代码上传"
            echo "desc=$INPUT_DESC" >> $GITHUB_OUTPUT
          fi

      - name: Upload MiniProgram
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          VERSION: ${{ steps.ver.outputs.version }}
          DESC: ${{ steps.ver.outputs.desc }}
        run: node scripts/upload.js
