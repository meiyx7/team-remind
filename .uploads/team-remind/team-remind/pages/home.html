<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style id="theme-vars">
    @theme inline {
      --color-primary: var(--color-brand);
      --color-primary-light: var(--color-brand-light);
      --color-primary-dark: var(--color-brand-dark);
      --color-background: var(--bg-primary);
      --color-foreground: var(--text-primary);
      --color-muted: var(--text-secondary);
      --color-muted-foreground: var(--text-tertiary);
      --color-border: var(--border-light);
      --color-card: var(--surface-elevated);
      --color-card-foreground: var(--text-primary);
      --color-accent: var(--color-brand);
      --color-accent-foreground: var(--text-inverse);
      --color-destructive: var(--state-error);
      --color-ring: var(--color-brand);
      --radius: var(--radius-md);
    }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
    @layer base {
      body { background: var(--bg-primary); color: var(--text-primary); }
      td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
      th { @apply whitespace-nowrap; }
    }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1em; height: 1em;
        -webkit-mask: var(--icon-url) no-repeat center/contain;
        mask: var(--icon-url) no-repeat center/contain;
        background: currentColor;
        flex-shrink: 0;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>

      <!-- Status bar spacer (44px) -->
      <div class="h-11 bg-[var(--bg-secondary)]"></div>

      <!-- WeChat navigation bar -->
      <header class="sticky top-0 z-30 border-b border-[var(--border-light)]" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);">
        <div class="flex h-11 items-center px-4">
          <div class="flex w-[88px] items-center justify-start">
            <!-- Root tab page — no back button, balancing area only -->
          </div>
          <div class="min-w-0 flex-1 text-center text-[16px] font-semibold tracking-[-0.02em] text-[var(--text-primary)]">
            团队待办
          </div>
          <div class="flex h-8 w-[88px] items-center justify-center rounded-full border border-[var(--border-light)] text-[var(--text-secondary)]" style="background: rgba(255,255,255,0.9);">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <span class="inline-flex h-4 w-4 items-center justify-center text-[13px] leading-none" aria-hidden="true">&#183;&#183;&#183;</span>
            </button>
            <span class="h-4 w-px bg-[var(--border-light)]" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <span class="inline-flex h-4 w-4 items-center justify-center text-[15px] leading-none" aria-hidden="true">&times;</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Page content area -->
      <div class="bg-[var(--bg-secondary)] px-4 pt-4 pb-24" style="font-family: var(--font-family);">

        <!-- Stats row: 3 stat cards -->
        <div class="flex gap-3 mb-6">
          <!-- 我的待办 -->
          <div class="flex-1 bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3" style="border-left: 3px solid var(--color-brand);">
            <div class="flex items-center gap-1.5 mb-1">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--color-brand)]"></span>
              <span class="text-[var(--text-secondary)] text-[13px] leading-[20px]">我的待办</span>
            </div>
            <div class="text-[var(--text-primary)] text-[24px] leading-[36px] font-bold" style="font-variant-numeric: tabular-nums;">5</div>
          </div>
          <!-- 进行中 -->
          <div class="flex-1 bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3" style="border-left: 3px solid var(--state-warning);">
            <div class="flex items-center gap-1.5 mb-1">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--state-warning)]"></span>
              <span class="text-[var(--text-secondary)] text-[13px] leading-[20px]">进行中</span>
            </div>
            <div class="text-[var(--text-primary)] text-[24px] leading-[36px] font-bold" style="font-variant-numeric: tabular-nums;">3</div>
          </div>
          <!-- 已完成 -->
          <div class="flex-1 bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3" style="border-left: 3px solid var(--color-gray-400);">
            <div class="flex items-center gap-1.5 mb-1">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--color-gray-400)]"></span>
              <span class="text-[var(--text-secondary)] text-[13px] leading-[20px]">已完成</span>
            </div>
            <div class="text-[var(--text-primary)] text-[24px] leading-[36px] font-bold" style="font-variant-numeric: tabular-nums;">12</div>
          </div>
        </div>

        <!-- Section: 我的团队 -->
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-[var(--text-primary)] text-[17px] leading-[28px] font-semibold">我的团队</h2>
          <a href="javascript:void(0)" data-dom-id="shortcut-team-list" class="text-[var(--color-brand)] text-[13px] leading-[20px] whitespace-nowrap">查看全部 &gt;</a>
        </div>

        <!-- Team quick access: horizontal scrollable cards -->
        <div class="flex gap-3 mb-6 overflow-x-auto no-scrollbar" style="margin-left: -16px; margin-right: -16px; padding-left: 16px; padding-right: 16px; padding-bottom: 4px;">
          <!-- Card 1: 产品设计组 -->
          <div class="shrink-0 bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3 flex items-center gap-3" style="width: 200px;">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-[var(--color-brand-lightest)] text-[var(--color-brand-dark)] text-[15px] font-semibold shrink-0">产</div>
            <div class="min-w-0 flex-1">
              <div class="text-[var(--text-primary)] text-[15px] leading-[24px] font-medium truncate">产品设计组</div>
              <div class="text-[var(--text-tertiary)] text-[13px] leading-[20px]" style="margin-top: 2px;">8人 · 3个待办</div>
            </div>
          </div>
          <!-- Card 2: 运营推广组 -->
          <div class="shrink-0 bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3 flex items-center gap-3" style="width: 200px;">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-[var(--color-gray-100)] text-[var(--state-info)] text-[15px] font-semibold shrink-0">运</div>
            <div class="min-w-0 flex-1">
              <div class="text-[var(--text-primary)] text-[15px] leading-[24px] font-medium truncate">运营推广组</div>
              <div class="text-[var(--text-tertiary)] text-[13px] leading-[20px]" style="margin-top: 2px;">5人 · 6个待办</div>
            </div>
          </div>
        </div>

        <!-- Section: 最近待办 -->
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-[var(--text-primary)] text-[17px] leading-[28px] font-semibold">最近待办</h2>
          <a href="javascript:void(0)" data-dom-id="shortcut-todo-list" class="text-[var(--color-brand)] text-[13px] leading-[20px] whitespace-nowrap">查看全部 &gt;</a>
        </div>

        <!-- Recent todo list -->
        <div class="flex flex-col gap-3">
          <!-- Todo 1: 进行中 -->
          <div class="bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3">
            <div class="flex items-start gap-3">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--state-warning)] shrink-0" style="margin-top: 6px;"></span>
              <div class="min-w-0 flex-1">
                <div class="text-[var(--text-primary)] text-[15px] leading-[24px] font-medium">完成首页设计稿</div>
                <div class="flex items-center gap-2" style="margin-top: 6px;">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-[var(--bg-tertiary)] text-[var(--text-tertiary)] text-[13px] leading-[20px] whitespace-nowrap">产品设计组</span>
                  <span class="text-[var(--text-tertiary)] text-[13px] leading-[20px]">截止: 7月5日</span>
                </div>
              </div>
              <span class="shrink-0 text-[var(--state-warning)] text-[13px] leading-[20px] whitespace-nowrap">进行中</span>
            </div>
          </div>

          <!-- Todo 2: 待开始 -->
          <div class="bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3">
            <div class="flex items-start gap-3">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--color-gray-400)] shrink-0" style="margin-top: 6px;"></span>
              <div class="min-w-0 flex-1">
                <div class="text-[var(--text-primary)] text-[15px] leading-[24px] font-medium">提交周报</div>
                <div class="flex items-center gap-2" style="margin-top: 6px;">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-[var(--bg-tertiary)] text-[var(--text-tertiary)] text-[13px] leading-[20px] whitespace-nowrap">产品设计组</span>
                  <span class="text-[var(--text-tertiary)] text-[13px] leading-[20px]">截止: 7月7日</span>
                </div>
              </div>
              <span class="shrink-0 text-[var(--color-gray-400)] text-[13px] leading-[20px] whitespace-nowrap">待开始</span>
            </div>
          </div>

          <!-- Todo 3: 已完成 -->
          <div class="bg-[var(--bg-primary)] border border-[var(--border-light)] rounded-lg p-3">
            <div class="flex items-start gap-3">
              <span class="inline-block h-2 w-2 rounded-full bg-[var(--state-success)] shrink-0" style="margin-top: 6px;"></span>
              <div class="min-w-0 flex-1">
                <div class="text-[var(--text-primary)] text-[15px] leading-[24px] font-medium">更新用户手册</div>
                <div class="flex items-center gap-2" style="margin-top: 6px;">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-[var(--bg-tertiary)] text-[var(--text-tertiary)] text-[13px] leading-[20px] whitespace-nowrap">运营推广组</span>
                  <span class="text-[var(--text-tertiary)] text-[13px] leading-[20px]">截止: 7月10日</span>
                </div>
              </div>
              <span class="shrink-0 text-[var(--state-success)] text-[13px] leading-[20px] whitespace-nowrap flex items-center gap-1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                已完成
              </span>
            </div>
          </div>
        </div>

      </div>

      <!-- FAB: floating action button -->
      <button data-dom-id="shortcut-create-todo" class="fixed z-20 flex h-12 w-12 items-center justify-center rounded-full bg-[var(--color-brand)] text-[var(--text-inverse)]" style="bottom: 100px; right: 16px; box-shadow: var(--shadow-lg);" aria-label="新建待办">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      <!-- Bottom Tab Bar — fixed, full width, 4 tabs -->
      <nav class="fixed bottom-0 inset-x-0 z-30 border-t border-[var(--border-light)] bg-[var(--bg-primary)]" role="tablist" aria-label="主导航">
        <div class="flex h-[50px] items-center justify-around">

          <!-- Tab: 首页 (Home) — active -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--color-brand)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="home"
                  data-active="true"
                  aria-label="首页"
                  aria-selected="true">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">首页</span>
          </button>

          <!-- Tab: 团队 (Team) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="team"
                  aria-label="团队"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">团队</span>
          </button>

          <!-- Tab: 待办 (Todo) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="todo"
                  aria-label="待办"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">待办</span>
          </button>

          <!-- Tab: 我的 (Profile) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="profile"
                  aria-label="我的"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">我的</span>
          </button>

        </div>

        <!-- Safe area bottom padding for full-screen devices -->
        <div class="h-[env(safe-area-inset-bottom,34px)] bg-[var(--bg-primary)]"></div>
      </nav>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
