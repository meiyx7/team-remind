<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队列表</title>
    <style id="theme-vars">
    @theme inline {
      --color-primary: var(--color-brand);
      --color-primary-light: var(--color-brand-light);
      --color-primary-dark: var(--color-brand-dark);
      --color-background: var(--bg-primary);
      --color-foreground: var(--text-primary);
      --color-muted: var(--text-secondary);
      --color-muted-foreground: var(--text-tertiary);
      --color-border: var(--border-light);
      --color-card: var(--surface-elevated);
      --color-card-foreground: var(--text-primary);
      --color-accent: var(--color-brand);
      --color-accent-foreground: var(--text-inverse);
      --color-destructive: var(--state-error);
      --color-ring: var(--color-brand);
      --radius: var(--radius-md);
    }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
    @layer base {
      body { background: var(--bg-primary); color: var(--text-primary); }
      td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
      th { @apply whitespace-nowrap; }
    }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1em; height: 1em;
        -webkit-mask: var(--icon-url) no-repeat center/contain;
        mask: var(--icon-url) no-repeat center/contain;
        background: currentColor;
        flex-shrink: 0;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background: var(--bg-secondary); font-family: var(--font-family);">

      <!-- Status bar spacer -->
      <div class="h-11 bg-[var(--bg-primary)]"></div>

      <!-- WeChat navigation bar -->
      <header class="sticky top-0 z-30 bg-[var(--bg-primary)]/95 backdrop-blur border-b border-[var(--border-light)]">
        <div class="flex h-11 items-center px-4">
          <!-- Left balancing area (root/tab page, no back button) -->
          <div class="flex w-[88px] items-center justify-start">
            <button class="inline-flex h-8 items-center justify-center rounded-lg border border-[var(--color-brand)] text-[var(--color-brand-dark)] text-[13px] font-medium px-3 gap-1 whitespace-nowrap" aria-label="创建团队">
              <span class="text-[14px] leading-none">+</span>
              <span>创建团队</span>
            </button>
          </div>
          <!-- Centered title -->
          <div class="min-w-0 flex-1 text-center text-[16px] font-semibold tracking-[-0.02em] text-[var(--text-primary)]">我的团队</div>
          <!-- Right system capsule -->
          <div class="flex h-8 w-[88px] items-center justify-center rounded-full border border-[var(--border-light)] bg-[var(--bg-primary)]/90 text-[var(--text-secondary)]">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <span class="inline-flex h-4 w-4 items-center justify-center text-[13px] leading-none" aria-hidden="true">···</span>
            </button>
            <span class="h-4 w-px bg-[var(--border-light)]" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <span class="inline-flex h-4 w-4 items-center justify-center text-[15px] leading-none" aria-hidden="true">&times;</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Page content area with bottom padding for tab bar -->
      <div class="px-4 pt-4 pb-[84px]">

        <!-- Search bar -->
        <div class="relative mb-4">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-[var(--text-tertiary)]"></i>
          <input
            type="text"
            placeholder="搜索团队..."
            class="w-full h-10 pl-9 pr-4 rounded-lg bg-[var(--bg-primary)] border border-[var(--border-light)] text-[var(--text-primary)] text-[14px] placeholder:text-[var(--text-tertiary)] outline-none focus:border-[var(--color-brand)] focus:ring-2 focus:ring-[var(--color-brand-lighter)] transition-colors duration-150"
            aria-label="搜索团队"
          >
        </div>

        <!-- Team list -->
        <div class="flex flex-col gap-3">

          <!-- Card 1: 产品设计组 -->
          <a href="#" data-dom-id="team-card-1" class="flex items-center gap-3 bg-[var(--bg-primary)] rounded-lg border border-[var(--border-light)] p-4 active:bg-[var(--bg-secondary)] transition-colors duration-120" style="border-left: 3px solid var(--color-brand);">
            <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[var(--text-inverse)] text-[14px] font-medium" style="background: var(--color-brand);">产</div>
            <div class="flex-1 min-w-0">
              <div class="truncate text-[15px] font-medium text-[var(--text-primary)] leading-[22px]">产品设计组</div>
              <div class="truncate text-[13px] text-[var(--text-tertiary)] leading-[20px]">8 位成员 · 3 个待办进行中</div>
            </div>
            <i data-lucide="chevron-right" class="h-4 w-4 shrink-0 text-[var(--text-tertiary)]"></i>
          </a>

          <!-- Card 2: 运营推广组 -->
          <a href="#" class="flex items-center gap-3 bg-[var(--bg-primary)] rounded-lg border border-[var(--border-light)] p-4 active:bg-[var(--bg-secondary)] transition-colors duration-120" style="border-left: 3px solid var(--state-info);">
            <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[var(--text-inverse)] text-[14px] font-medium" style="background: var(--state-info);">运</div>
            <div class="flex-1 min-w-0">
              <div class="truncate text-[15px] font-medium text-[var(--text-primary)] leading-[22px]">运营推广组</div>
              <div class="truncate text-[13px] text-[var(--text-tertiary)] leading-[20px]">5 位成员 · 6 个待办进行中</div>
            </div>
            <i data-lucide="chevron-right" class="h-4 w-4 shrink-0 text-[var(--text-tertiary)]"></i>
          </a>

          <!-- Card 3: 技术研发组 -->
          <a href="#" class="flex items-center gap-3 bg-[var(--bg-primary)] rounded-lg border border-[var(--border-light)] p-4 active:bg-[var(--bg-secondary)] transition-colors duration-120" style="border-left: 3px solid var(--state-warning);">
            <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[var(--text-inverse)] text-[14px] font-medium" style="background: var(--state-warning);">研</div>
            <div class="flex-1 min-w-0">
              <div class="truncate text-[15px] font-medium text-[var(--text-primary)] leading-[22px]">技术研发组</div>
              <div class="truncate text-[13px] text-[var(--text-tertiary)] leading-[20px]">12 位成员 · 9 个待办进行中</div>
            </div>
            <i data-lucide="chevron-right" class="h-4 w-4 shrink-0 text-[var(--text-tertiary)]"></i>
          </a>

        </div>
      </div>

      <!-- Bottom Tab Bar -->
      <nav class="fixed bottom-0 inset-x-0 z-30 border-t border-[var(--border-light)] bg-[var(--bg-primary)]" role="tablist" aria-label="主导航">
        <div class="flex h-[50px] items-center justify-around">

          <!-- Tab: 首页 (Home) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="home"
                  aria-label="首页"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">首页</span>
          </button>

          <!-- Tab: 团队 (Team) — ACTIVE -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--color-brand)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="team"
                  data-active="true"
                  aria-label="团队"
                  aria-selected="true">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">团队</span>
          </button>

          <!-- Tab: 待办 (Todo) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="todo"
                  aria-label="待办"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">待办</span>
          </button>

          <!-- Tab: 我的 (Profile) -->
          <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                  role="tab"
                  data-nav-key="profile"
                  aria-label="我的"
                  aria-selected="false">
            <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">我的</span>
          </button>

        </div>

        <!-- Safe area bottom padding for full-screen devices -->
        <div class="h-[env(safe-area-inset-bottom,34px)] bg-[var(--bg-primary)]"></div>
      </nav>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
