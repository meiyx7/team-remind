<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <style id="theme-vars">
    @theme inline {
      --color-primary: var(--color-brand);
      --color-primary-light: var(--color-brand-light);
      --color-primary-dark: var(--color-brand-dark);
      --color-background: var(--bg-primary);
      --color-foreground: var(--text-primary);
      --color-muted: var(--text-secondary);
      --color-muted-foreground: var(--text-tertiary);
      --color-border: var(--border-light);
      --color-card: var(--surface-elevated);
      --color-card-foreground: var(--text-primary);
      --color-accent: var(--color-brand);
      --color-accent-foreground: var(--text-inverse);
      --color-destructive: var(--state-error);
      --color-ring: var(--color-brand);
      --radius: var(--radius-md);
    }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
    @layer base {
      body { background: var(--bg-primary); color: var(--text-primary); }
      td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
      th { @apply whitespace-nowrap; }
    }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1em; height: 1em;
        -webkit-mask: var(--icon-url) no-repeat center/contain;
        mask: var(--icon-url) no-repeat center/contain;
        background: currentColor;
        flex-shrink: 0;
      }
    </style>
    <style>
      /* CSS-only toggle switch */
      .toggle-track {
        width: 44px;
        height: 24px;
        border-radius: 12px;
        background: var(--color-gray-300, #d1d5db);
        position: relative;
        flex-shrink: 0;
        transition: background 200ms cubic-bezier(.2,.8,.2,1);
      }
      .toggle-track::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(0,0,0,0.12);
        transition: transform 200ms cubic-bezier(.2,.8,.2,1);
      }
      /* Soul element: emerald gradient wash on profile card top edge */
      .profile-card {
        position: relative;
        overflow: hidden;
      }
      .profile-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--color-brand, #10b981), var(--color-brand-light, #34d399));
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- Mini program status bar spacer -->
    <div class="h-11 bg-[var(--bg-secondary)]"></div>

    <!-- WeChat navigation bar -->
    <header class="sticky top-0 z-30 border-b border-[var(--border-light)] bg-[var(--bg-primary)]/95 backdrop-blur">
      <div class="flex h-11 items-center px-4">
        <div class="flex w-[88px] items-center justify-start">
          <!-- Root tab page: empty for balancing -->
        </div>
        <div class="min-w-0 flex-1 text-center text-[16px] font-semibold tracking-[-0.02em] text-[var(--text-primary)]">我的</div>
        <div class="flex h-8 w-[88px] items-center justify-center rounded-full border border-[var(--border-light)] bg-[var(--bg-primary)]/90 text-[var(--text-secondary)]">
          <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
            <span class="inline-flex h-4 w-4 items-center justify-center text-[13px] leading-none" aria-hidden="true">···</span>
          </button>
          <span class="h-4 w-px bg-[var(--border-light)]" aria-hidden="true"></span>
          <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
            <span class="inline-flex h-4 w-4 items-center justify-center text-[15px] leading-none" aria-hidden="true">&times;</span>
          </button>
        </div>
      </div>
    </header>

    <main class="min-h-[calc(100vh-176px)] pb-[84px]" style="font-family: var(--font-family);">

      <!-- Content area with horizontal padding -->
      <div class="px-4 pt-4">

        <!-- Profile Card -->
        <div class="profile-card rounded-[var(--radius-lg)] border border-[var(--border-light)] bg-[var(--bg-primary)] p-4">
          <div class="flex items-center gap-3">
            <!-- Avatar -->
            <div class="flex h-14 w-14 flex-shrink-0 items-center justify-center rounded-full" style="background-color: var(--color-brand, #10b981);">
              <span class="text-[22px] font-semibold" style="color: var(--text-inverse, #ffffff);">我</span>
            </div>
            <!-- User info -->
            <div class="flex flex-1 flex-col gap-0.5 min-w-0">
              <span class="text-[17px] font-semibold leading-[24px] truncate" style="color: var(--text-primary);">张明</span>
              <span class="text-[13px] leading-[20px] truncate" style="color: var(--text-tertiary);">zhangming@email.com</span>
            </div>
            <!-- Chevron -->
            <span class="flex-shrink-0 text-[var(--text-tertiary)]" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </div>
        </div>

        <!-- Section 1: 偏好设置 -->
        <div class="mt-3">
          <div class="rounded-[var(--radius-lg)] border border-[var(--border-light)] bg-[var(--bg-primary)] overflow-hidden">
            <!-- 深色模式 -->
            <div class="flex items-center justify-between px-4 py-[14px]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">深色模式</span>
              <div class="toggle-track" role="switch" aria-checked="false" aria-label="深色模式"></div>
            </div>
            <!-- 主题换肤 -->
            <div class="flex items-center justify-between px-4 py-[14px] border-t border-[var(--border-light)]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">主题换肤</span>
              <div class="flex items-center gap-2">
                <span class="text-[13px] leading-[20px]" style="color: var(--text-tertiary);">经典绿</span>
                <span class="flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: 团队管理 -->
        <div class="mt-3">
          <div class="rounded-[var(--radius-lg)] border border-[var(--border-light)] bg-[var(--bg-primary)] overflow-hidden">
            <!-- 我的团队 -->
            <div class="flex items-center justify-between px-4 py-[14px]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">我的团队</span>
              <div class="flex items-center gap-2">
                <span class="text-[13px] leading-[20px]" style="color: var(--text-tertiary);">3 个团队</span>
                <span class="flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
              </div>
            </div>
            <!-- 消息通知 -->
            <div class="flex items-center justify-between px-4 py-[14px] border-t border-[var(--border-light)]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">消息通知</span>
              <span class="flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </span>
            </div>
          </div>
        </div>

        <!-- Section 3: 其他 -->
        <div class="mt-3 mb-4">
          <div class="rounded-[var(--radius-lg)] border border-[var(--border-light)] bg-[var(--bg-primary)] overflow-hidden">
            <!-- 帮助与反馈 -->
            <div class="flex items-center justify-between px-4 py-[14px]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">帮助与反馈</span>
              <span class="flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </span>
            </div>
            <!-- 关于团队待办 -->
            <div class="flex items-center justify-between px-4 py-[14px] border-t border-[var(--border-light)]">
              <span class="text-[15px] leading-[22px]" style="color: var(--text-primary);">关于团队待办</span>
              <div class="flex items-center gap-2">
                <span class="text-[13px] leading-[20px]" style="color: var(--text-tertiary);">v1.0.0</span>
                <span class="flex-shrink-0" style="color: var(--text-tertiary);" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
              </div>
            </div>
          </div>
        </div>

      </div>

    </main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-30 border-t border-[var(--border-light)] bg-[var(--bg-primary)]" role="tablist" aria-label="主导航">
      <div class="flex h-[50px] items-center justify-around">

        <!-- Tab: 首页 -->
        <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                role="tab"
                data-nav-key="home"
                aria-label="首页"
                aria-selected="false">
          <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </span>
          <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">首页</span>
        </button>

        <!-- Tab: 团队 -->
        <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                role="tab"
                data-nav-key="team"
                aria-label="团队"
                aria-selected="false">
          <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">团队</span>
        </button>

        <!-- Tab: 待办 -->
        <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 text-[var(--text-tertiary)] transition-colors duration-150"
                role="tab"
                data-nav-key="todo"
                aria-label="待办"
                aria-selected="false">
          <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </span>
          <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">待办</span>
        </button>

        <!-- Tab: 我的 (active) -->
        <button class="flex flex-1 flex-col items-center justify-center gap-0.5 py-1 transition-colors duration-150"
                role="tab"
                data-nav-key="profile"
                data-active="true"
                aria-label="我的"
                aria-selected="true"
                style="color: var(--color-brand, #10b981);">
          <span class="flex h-5 w-5 items-center justify-center text-[20px] leading-none" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <span class="text-[10px] leading-[14px] font-medium whitespace-nowrap">我的</span>
        </button>

      </div>

      <!-- Safe area bottom -->
      <div class="h-[env(safe-area-inset-bottom,34px)] bg-[var(--bg-primary)]"></div>
    </nav>

    <script>lucide.createIcons();</script>
</body>
</html>
